<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hack_rage · nur voice</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --acc:#8b5cf6;
  --acc2:#a78bfa;
  --acc3:#c4b5fd;
  --bg:#07090e;
  --bg2:#0c0f17;
  --bg3:#111520;
  --bg4:#161b28;
  --brd:rgba(255,255,255,.055);
  --brd-h:rgba(139,92,246,.4);
  --txt:rgba(255,255,255,.9);
  --txt2:rgba(255,255,255,.55);
  --txt3:rgba(255,255,255,.25);
  --new:#10b981;
  --tt:#fe2c55;
}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

html{scroll-behavior:smooth}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  min-height:100vh;
  padding:24px 16px 56px;
  overflow-x:hidden;
}

/* ── ambient orbs ── */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px)}
.orb1{
  width:700px;height:700px;top:-300px;left:-200px;
  background:radial-gradient(circle,rgba(99,60,220,.09),transparent 65%);
  animation:orbA 15s ease-in-out infinite;
}
.orb2{
  width:500px;height:500px;bottom:-200px;right:-150px;
  background:radial-gradient(circle,rgba(139,92,246,.07),transparent 65%);
  animation:orbA 20s ease-in-out infinite reverse;
}
.orb3{
  width:300px;height:300px;top:40%;left:50%;
  background:radial-gradient(circle,rgba(59,130,246,.04),transparent 65%);
  animation:orbA 25s ease-in-out infinite;
}
@keyframes orbA{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(40px,-30px) scale(1.08)}
  66%{transform:translate(-25px,35px) scale(.95)}
}

/* ── page ── */
.page{
  position:relative;z-index:1;
  max-width:1120px;margin:0 auto;
}

/* ── WRAPPER CARD ── */
.wrap{
  background:linear-gradient(160deg,rgba(17,21,32,.95) 0%,rgba(10,13,20,.98) 100%);
  border:1px solid var(--brd);
  border-radius:40px;
  padding:36px 32px 48px;
  box-shadow:0 40px 100px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.02) inset,0 0 100px rgba(99,60,220,.04);
  animation:wrapIn .7s cubic-bezier(.16,1,.3,1) both;
}
@keyframes wrapIn{
  from{opacity:0;transform:translateY(28px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:32px;flex-wrap:wrap;gap:14px 16px;
}

/* brand */
.brand{display:flex;align-items:center;gap:15px}

.brand-icon{
  width:50px;height:50px;border-radius:17px;flex-shrink:0;
  background:linear-gradient(145deg,#5b21b6,#8b5cf6 50%,#a78bfa);
  display:flex;align-items:center;justify-content:center;
  font-size:23px;font-weight:900;color:#fff;
  box-shadow:0 8px 32px rgba(99,60,220,.5),0 0 0 1px rgba(196,181,253,.15) inset;
  position:relative;overflow:hidden;
  animation:iconBob 5s ease-in-out infinite;
}
.brand-icon::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 55%);
}
@keyframes iconBob{
  0%,100%{transform:translateY(0) rotate(0deg)}
  25%{transform:translateY(-2px) rotate(.5deg)}
  75%{transform:translateY(2px) rotate(-.5deg)}
}

.brand-txt{display:flex;flex-direction:column;gap:2px}
.brand-txt .main{
  font-size:24px;font-weight:900;letter-spacing:-1px;line-height:1;
  background:linear-gradient(110deg,#fff 0%,#c4b5fd 55%,#818cf8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.brand-txt .sub{
  font-size:10.5px;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;color:var(--txt3);
}

/* right controls */
.topbar-r{display:flex;align-items:center;gap:9px;flex-wrap:wrap}

/* tiktok */
.tt-btn{
  display:flex;align-items:center;gap:7px;
  padding:9px 17px 9px 13px;border-radius:100px;
  background:rgba(254,44,85,.07);
  border:1px solid rgba(254,44,85,.22);
  color:#ff4d6d;font-size:12px;font-weight:700;letter-spacing:.3px;
  text-decoration:none;cursor:pointer;white-space:nowrap;
  transition:background .25s,border-color .25s,transform .22s,box-shadow .25s;
}
.tt-btn:hover{
  background:rgba(254,44,85,.16);
  border-color:rgba(254,44,85,.5);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(254,44,85,.2);
}
.tt-btn:active{transform:scale(.96)}
.tt-btn svg{width:15px;height:15px;flex-shrink:0}

/* badge */
.badge{
  display:flex;align-items:center;gap:8px;
  padding:8px 17px;border-radius:100px;
  background:rgba(139,92,246,.06);
  border:1px solid rgba(139,92,246,.14);
  color:var(--txt2);font-size:11.5px;font-weight:600;letter-spacing:.3px;
  white-space:nowrap;
}
.badge-dot{
  width:7px;height:7px;border-radius:50%;background:var(--acc2);flex-shrink:0;
  box-shadow:0 0 10px var(--acc2);
  animation:dotPulse 2.2s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.35;transform:scale(.6)}
}

/* version */
.ver{
  font-size:10px;font-weight:700;letter-spacing:.8px;
  color:var(--acc3);
  background:rgba(139,92,246,.1);
  border:1px solid rgba(139,92,246,.2);
  padding:5px 11px;border-radius:100px;
}

/* ── DIVIDER ── */
.div{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(139,92,246,.2) 25%,rgba(99,60,220,.35) 50%,rgba(139,92,246,.2) 75%,transparent);
  margin-bottom:30px;
}

/* ── LABEL ── */
.lbl{
  font-size:10.5px;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;color:var(--txt3);
  margin-bottom:20px;padding:0 2px;
}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(142px,1fr));
  gap:18px 15px;
}

/* ── CARD ── */
.card{
  position:relative;display:flex;flex-direction:column;align-items:center;
  text-decoration:none;
  background:var(--bg3);
  border:1px solid var(--brd);
  border-radius:28px;
  padding:16px 12px 18px;
  overflow:hidden;
  opacity:0;
  animation:cardIn .55s cubic-bezier(.34,1.56,.64,1) forwards;
  transition:
    transform .4s cubic-bezier(.34,1.56,.64,1),
    border-color .3s,background .3s,box-shadow .4s;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(22px) scale(.92)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.card::before{
  content:'';position:absolute;inset:0;border-radius:28px;
  background:linear-gradient(145deg,rgba(167,139,250,.07) 0%,transparent 55%);
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.card:hover{
  transform:translateY(-8px) scale(1.025);
  background:var(--bg4);
  border-color:var(--brd-h);
  box-shadow:0 22px 56px rgba(99,60,220,.22),0 0 0 1px rgba(99,60,220,.1),0 4px 16px rgba(0,0,0,.55);
}
.card:hover::before{opacity:1}
.card:active{transform:translateY(-2px) scale(1.01)}
.card:focus-visible{outline:2px solid var(--acc2);outline-offset:3px}

/* rank badge */
.rank{
  position:absolute;top:10px;left:10px;
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  font-size:8.5px;font-weight:700;color:var(--txt3);
  display:flex;align-items:center;justify-content:center;
  letter-spacing:0;z-index:3;
}

/* ★ NEW badge ── */
.new-badge{
  position:absolute;top:9px;right:9px;z-index:4;
  background:linear-gradient(135deg,#059669,#10b981);
  color:#fff;font-size:8px;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;padding:3px 8px;border-radius:100px;
  box-shadow:0 4px 14px rgba(16,185,129,.45);
  animation:newPop .6s cubic-bezier(.34,1.56,.64,1) both,newGlow 2.5s ease-in-out infinite .6s;
}
@keyframes newPop{
  from{opacity:0;transform:scale(0) rotate(-10deg)}
  to{opacity:1;transform:scale(1) rotate(0deg)}
}
@keyframes newGlow{
  0%,100%{box-shadow:0 4px 14px rgba(16,185,129,.45)}
  50%{box-shadow:0 4px 22px rgba(16,185,129,.75)}
}

/* ─── COMING SOON overlay ─── */
.card.coming{pointer-events:none;cursor:default}
.card.coming .avatar-wrap{filter:blur(3px);opacity:.35}
.card.coming .name{opacity:.3}
.coming-overlay{
  position:absolute;inset:0;border-radius:28px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;z-index:5;
  background:rgba(7,9,14,.45);
  backdrop-filter:blur(1px);
}
.coming-overlay .soon-icon{font-size:20px;line-height:1}
.coming-overlay .soon-txt{
  font-size:9px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--txt3);
}

/* avatar */
.avatar-wrap{
  width:86px;height:86px;border-radius:50%;overflow:hidden;
  background:var(--bg2);
  border:2px solid rgba(255,255,255,.055);
  box-shadow:inset 0 3px 12px rgba(0,0,0,.6);
  transition:border-color .35s,box-shadow .4s,transform .4s;
  position:relative;flex-shrink:0;z-index:1;
}
.card:hover .avatar-wrap{
  border-color:rgba(139,92,246,.55);
  box-shadow:0 0 28px rgba(99,60,220,.25),inset 0 3px 12px rgba(0,0,0,.6);
  transform:scale(1.05);
}
.avatar-wrap img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .5s ease;
}
.card:hover .avatar-wrap img{transform:scale(1.09)}

/* spinning ring */
.av-ring{
  position:absolute;inset:-5px;border-radius:50%;
  border:1.5px solid transparent;
  background:conic-gradient(from 0deg,#a78bfa,#6d28d9,#a78bfa,transparent 55%) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  opacity:0;transition:opacity .4s;
  animation:ringRot 3s linear infinite;
}
.card:hover .av-ring{opacity:1}
@keyframes ringRot{to{transform:rotate(360deg)}}

/* status dot (active/online) */
.status-dot{
  position:absolute;bottom:3px;right:3px;
  width:14px;height:14px;border-radius:50%;
  background:#22c55e;border:2.5px solid var(--bg);
  z-index:2;
  box-shadow:0 0 10px rgba(34,197,94,.6);
  animation:statusPulse 2.5s ease-in-out infinite;
}
@keyframes statusPulse{
  0%,100%{box-shadow:0 0 10px rgba(34,197,94,.6)}
  50%{box-shadow:0 0 18px rgba(34,197,94,.9)}
}

/* name */
.name{
  margin-top:11px;font-size:11.5px;font-weight:600;
  color:var(--txt2);text-align:center;
  line-height:1.35;padding:0 4px;
  word-break:break-word;
  transition:color .25s;z-index:1;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card:hover .name{color:var(--txt)}

/* bottom glow */
.bot-glow{
  position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);
  width:70%;height:36px;
  background:radial-gradient(ellipse,rgba(99,60,220,.22),transparent 70%);
  filter:blur(6px);opacity:0;transition:opacity .4s;pointer-events:none;
}
.card:hover .bot-glow{opacity:1}

/* ── FOOTER ── */
.footer{
  margin-top:40px;padding-top:20px;
  border-top:1px solid rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;
  color:var(--txt3);font-size:11px;font-weight:500;letter-spacing:.3px;
}
.footer-l{display:flex;align-items:center;gap:8px}
.footer-sep{width:3px;height:3px;border-radius:50%;background:var(--txt3)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .wrap{border-radius:32px;padding:28px 22px 40px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:15px 12px}
}
@media(max-width:640px){
  body{padding:12px 10px 40px}
  .wrap{border-radius:26px;padding:22px 16px 32px}
  .topbar{margin-bottom:22px}
  .brand-icon{width:42px;height:42px;font-size:19px;border-radius:14px}
  .brand-txt .main{font-size:20px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:13px 10px}
  .avatar-wrap{width:72px;height:72px}
  .card{border-radius:22px;padding:13px 9px 15px}
  .name{font-size:10.5px;margin-top:9px}
}
@media(max-width:430px){
  body{padding:8px 8px 32px}
  .wrap{border-radius:20px;padding:18px 12px 26px}
  .tt-btn .tt-lbl{display:none}
  .tt-btn{padding:9px 11px}
  .badge .b-lbl{display:none}
  .grid{grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px 8px}
  .avatar-wrap{width:60px;height:60px}
  .card{border-radius:18px;padding:10px 7px 12px}
  .name{font-size:9.5px;margin-top:8px}
  .rank{width:18px;height:18px;font-size:7.5px}
}
@media(max-width:340px){
  .grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .avatar-wrap{width:52px;height:52px}
  .card{border-radius:14px;padding:8px 5px 10px}
  .name{font-size:8.5px}
}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(139,92,246,.2);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:rgba(139,92,246,.38)}
</style>
</head>
<body>

<!-- ambient orbs -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="page">
<div class="wrap">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <div class="brand-txt">
        <span class="main">Hack_rage</span>
        <span class="sub">nur voice</span>
      </div>
    </div>

    <div class="topbar-r">
      <!-- TikTok -->
      <a class="tt-btn"
         href="https://www.tiktok.com/@hack.rage?_r=1&_t=ZS-97JhBD4RA3N"
         target="_blank" rel="noopener noreferrer"
         title="Наш TikTok">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.35 6.35 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V9.41a8.16 8.16 0 0 0 4.77 1.52V7.48a4.85 4.85 0 0 1-1-.79z" fill="#fe2c55"/>
        </svg>
        <span class="tt-lbl">TikTok</span>
      </a>

      <div class="badge">
        <span class="badge-dot"></span>
        <span class="b-lbl">чтецы · <span id="count">0</span></span>
      </div>

      <span class="ver">v1.0</span>
    </div>
  </header>

  <div class="div"></div>
  <p class="lbl">Все чтецы</p>

  <!-- GRID -->
  <div class="grid" id="grid"></div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-l">
      <span>✦ Hack_rage</span>
      <span class="footer-sep"></span>
      <span>создано: 18.06.2026</span>
      <span class="footer-sep"></span>
      <span>v1.0</span>
    </div>
    <span>Quran Reciters</span>
  </footer>

</div>
</div>

<script>
const items = [
  {
    title: "Махди аш-Шишани",
    img: "https://i.pinimg.com/736x/7b/f6/1e/7bf61edf5b3e3b27fde02ca08901ef00.jpg",
    file: "./user2/Махди аш-Шишани.html",
    isNew: true,
    isNew: false
  },
  {
    title: "Умайр Шамим",
    img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSXSkiBwYHJAR9hNxt0xxnD9xobberxpEgPTg&s",
    file: "./user/Умайр Шамим.html",
    
    COMING: true
   
  },
  {
    title: "Мухаммад аль-Люхайдан",
    img: "https://i.pinimg.com/736x/5c/43/c0/5c43c0dae900fb11f5382e94b4697af6.jpg",
    file: "./user3/Мухаммад аль-Люхайдан.html",
    COMING: true
  },
   {
    title: "Ясир ад-Даусари",
    img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRRgxof1-H8vbVVjDpVll_gAF1vC-TflGyPejlvG7NBUw&s=10",
    file: "./user4/Ясир ад-Даусари.html",
    isNew: true,
    coming: true
  }
  


  /* ─── ШАБЛОН: чтец в разработке (скоро) ───
  {
    title: "Имя чтеца",
    img: "",
    file: "",
    coming: true
  },
  */
];

const grid = document.getElementById("grid");
document.getElementById("count").textContent = items.filter(i => !i.coming).length;

items.forEach((item, i) => {
  const a = document.createElement("a");
  a.className = "card" + (item.coming ? " coming" : "");
  if (!item.coming && item.file) a.href = item.file;
  a.style.animationDelay = (i * 60) + "ms";
  a.setAttribute("aria-label", item.title);
  //это ещё не готов 
//   a.addEventListener("click", (e) => {
//   if (item.title === "Сиратулло раупов") {
//     e.preventDefault(); // чтобы не открывал файл
//     alert("Этот чтец ещё не готов 🚧");
//   }
// });
  

  /* rank */
  const rank = document.createElement("div");
  rank.className = "rank";
  rank.textContent = String(i + 1).padStart(2, "0");


  if (item.isNew && !item.coming) {
    const nb = document.createElement("div");
    nb.className = "new-badge";
    nb.style.animationDelay = (i * 60 + 300) + "ms";
    nb.textContent = "NEW";
    a.appendChild(nb);
  }

  if (item.coming) {
    const ov = document.createElement("div");
    ov.className = "coming-overlay";
    ov.innerHTML = '<span class="soon-icon">🔒</span><span class="soon-txt">Скоро</span>';
    a.appendChild(ov);
  }

  /* avatar */
  const wrap = document.createElement("div");
  wrap.className = "avatar-wrap";

  const ring = document.createElement("div");
  ring.className = "av-ring";
  wrap.appendChild(ring);

  if (item.img) {
    const im = document.createElement("img");
    im.src = item.img;
    im.alt = item.title;
    im.loading = "lazy";
    im.onerror = function(){
      this.style.display = "none";
      const ph = document.createElement("div");
      ph.style.cssText = "width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#1e1b4b,#312e81);font-size:26px;font-weight:800;color:rgba(167,139,250,.5)";
      ph.textContent = item.title.charAt(0);
      wrap.appendChild(ph);
    };
    wrap.appendChild(im);
  } else {
    const ph = document.createElement("div");
    ph.style.cssText = "width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#1e1b4b,#312e81);font-size:26px;font-weight:800;color:rgba(167,139,250,.5)";
    ph.textContent = item.title.charAt(0);
    wrap.appendChild(ph);
  }

  /* active / online dot */
  if (item.active) {
    const sd = document.createElement("div");
    sd.className = "status-dot";
    wrap.appendChild(sd);
  }

  /* bottom glow */
  const glow = document.createElement("div");
  glow.className = "bot-glow";

  /* name */
  const name = document.createElement("span");
  name.className = "name";
  name.textContent = item.title;

  a.append(rank, wrap, name, glow);
  grid.appendChild(a);
});
</script>
</body>
</html>
