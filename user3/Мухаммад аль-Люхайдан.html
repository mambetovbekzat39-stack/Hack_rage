<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Коран плеер · nur·voice</title>
      <meta name="description" content="чтец Мухаммад аль-Люхайдан">
      <meta name="google-site-verification" content="34xmAkrgWgMN6jtddyTNM6W2by8bJYK1qUzxsSzp8wQ" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ---------- RESET & ПЕРЕМЕННЫЕ ---------- */
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg:      #080a0f;
            --bg2:     #0d0f17;
            --bg3:     #12151f;
            --bg4:     #181c2c;
            --card:    #10121c;
            --border:  rgba(255,255,255,.07);
            --purple:  #7c5ce7;
            --purple2: #a78bfa;
            --purple3: #c4b5fd;
            --gold:    #c8a96e;
            --gold2:   #e8c98e;
            --gold-dim:rgba(200,169,110,.14);
            --text:    #f0ece0;
            --muted:   #7a7590;
            --radius:  20px;
        }
        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        button { cursor: pointer; border: none; background: none; font-family: inherit; }
        input   { font-family: inherit; }

        /* ── Animated ambient background ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 15% 10%, rgba(108,92,231,.1), transparent),
                radial-gradient(ellipse 60% 60% at 85% 85%, rgba(139,92,246,.07), transparent);
            animation: ambientShift 14s ease-in-out infinite alternate;
        }
        @keyframes ambientShift {
            0%  { opacity: 1; }
            50% { opacity: .55; }
            100%{ opacity: 1; }
        }

        /* ============ ГЛАВНАЯ ============ */
        .app {
            position: relative; z-index: 1;
            padding: 16px 16px 100px;
            max-width: 720px;
            margin: 0 auto;
        }

        /* ── Top navigation bar ── */
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 0 20px; gap: 12px;
        }
        .topbar-back {
            width: 40px; height: 40px; border-radius: 14px;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.07);
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,.65); font-size: 18px;
            transition: .2s; text-decoration: none;
            flex-shrink: 0;
        }
        .topbar-back:hover  { background: rgba(124,92,231,.15); border-color: rgba(124,92,231,.35); color: #fff; }
        .topbar-back:active { transform: scale(.92); }

        .brand {
            display: flex; align-items: center; gap: 10px;
        }
        .brand-icon {
            width: 36px; height: 36px; border-radius: 11px;
            background: linear-gradient(135deg, #6c5ce7, #a78bfa);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 800; color: #fff;
            box-shadow: 0 6px 20px rgba(108,92,231,.4);
            animation: iconFloat 4s ease-in-out infinite;
        }
        @keyframes iconFloat {
            0%,100%{ transform: translateY(0); }
            50%    { transform: translateY(-2px); }
        }
        .brand-title {
            font-size: 20px; font-weight: 800; letter-spacing: -.5px;
            background: linear-gradient(120deg, #fff 0%, #c4b5fd 60%, #818cf8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .badge {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.06);
            padding: 7px 16px; border-radius: 100px;
            backdrop-filter: blur(12px);
        }
        .badge-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--purple2);
            box-shadow: 0 0 10px var(--purple2);
            animation: dotPulse 2s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%,100%{ opacity:1; transform:scale(1); box-shadow:0 0 10px var(--purple2); }
            50%    { opacity:.35; transform:scale(.6); box-shadow:0 0 3px var(--purple2); }
        }
        .badge span { font-size: 12px; font-weight: 600; letter-spacing: .4px; color: rgba(255,255,255,.38); }

        /* divider */
        .divider {
            height: 1px; margin-bottom: 24px;
            background: linear-gradient(90deg, transparent, rgba(124,92,231,.25) 35%, rgba(167,139,250,.3) 50%, rgba(124,92,231,.25) 65%, transparent);
        }

        /* search */
        .search-bar { margin-bottom: 18px; }
        .search-bar input {
            width: 100%;
            padding: 12px 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--bg3);
            color: var(--text);
            font-size: 14px; outline: none;
            transition: .25s;
        }
        .search-bar input::placeholder { color: var(--muted); }
        .search-bar input:focus {
            border-color: rgba(124,92,231,.5);
            box-shadow: 0 0 0 3px rgba(124,92,231,.12);
            background: var(--bg4);
        }

        /* sura list */
        .sura-list { display: flex; flex-direction: column; gap: 8px; }

        .sura-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 13px 16px;
            display: flex; align-items: center; gap: 12px;
            cursor: pointer;
            transition: all .25s cubic-bezier(.34,1.56,.64,1);
            position: relative; overflow: hidden;
        }
        .sura-item::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(124,92,231,.06), transparent 60%);
            opacity: 0; transition: opacity .3s;
        }
        .sura-item:hover { transform: translateY(-2px) scale(1.005); border-color: rgba(124,92,231,.2); background: var(--bg3); }
        .sura-item:hover::before { opacity: 1; }
        .sura-item:active { transform: scale(.97); border-color: rgba(124,92,231,.4); }

        .sura-num {
            width: 38px; height: 38px; border-radius: 12px;
            background: rgba(124,92,231,.1);
            border: 1px solid rgba(124,92,231,.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; color: var(--purple2);
            flex-shrink: 0; position: relative; z-index: 1;
        }
        .sura-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
        .sura-name { font-size: 14px; font-weight: 600; color: rgba(255,255,255,.88); }
        .sura-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }

        .sura-right { text-align: right; flex-shrink: 0; position: relative; z-index: 1; }
        .sura-arabic   { font-size: 18px; color: var(--gold2); direction: rtl; }
        .sura-duration { font-size: 11px; color: var(--muted); margin-top: 2px; }

        .show-more-btn {
            display: block; width: 100%;
            padding: 13px;
            background: rgba(124,92,231,.06);
            border: 1px dashed rgba(124,92,231,.2);
            border-radius: 14px;
            color: var(--purple2);
            font-size: 13px; font-weight: 600;
            text-align: center; transition: .2s;
            margin-top: 8px;
        }
        .show-more-btn:hover { background: rgba(124,92,231,.1); border-color: rgba(124,92,231,.4); }
        .show-more-btn:active { transform: scale(.97); }

        /* ============ ПЛЕЕР (оверлей) ============ */
        .player-overlay {
            position: fixed; inset: 0; z-index: 300;
            display: none; flex-direction: column;
            background: #000;
        }
        .player-overlay.open { display: flex; }

        .player-bg {
            position: absolute; inset: 0; z-index: 0;
        }
        .player-bg video { width: 100%; height: 100%; object-fit: cover; }
        .player-bg .fallback {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 60px; color: rgba(255,255,255,.04);
        }

        .player-overlay .overlay {
            position: absolute; inset: 0; z-index: 1;
            background: linear-gradient(180deg,
                rgba(8,10,15,.5) 0%,
                rgba(8,10,15,.72) 50%,
                rgba(8,10,15,.95) 100%);
        }

        /* subtle purple vignette */
        .player-overlay .vignette {
            position: absolute; inset: 0; z-index: 1; pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 20% 5%, rgba(108,92,231,.12), transparent),
                radial-gradient(ellipse 60% 60% at 80% 90%, rgba(139,92,246,.08), transparent);
        }

        .player-content {
            position: relative; z-index: 2;
            flex: 1; display: flex; flex-direction: column;
            padding: 0 0 20px;
            justify-content: space-between;
            min-height: 100vh; min-height: 100dvh;
        }

        /* player header */
        .player-header {
            padding: 44px 16px 12px;
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .player-back {
            width: 42px; height: 42px; border-radius: 14px;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.1);
            color: #fff; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: .2s; text-decoration: none;
        }
        .player-back:hover  { background: rgba(124,92,231,.25); border-color: rgba(124,92,231,.4); }
        .player-back:active { transform: scale(.92); }

        .player-header-info { flex: 1; min-width: 0; }
        .player-header-info h3 {
            font-size: 15px; font-weight: 700; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .player-header-info p { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 1px; }

        .player-bg-btn {
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 12px;
            color: rgba(255,255,255,.8);
            padding: 7px 14px;
            font-size: 12px; font-weight: 600;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; align-items: center; gap: 5px;
            transition: .2s; white-space: nowrap;
        }
        .player-bg-btn:hover  { background: rgba(124,92,231,.2); border-color: rgba(124,92,231,.35); }
        .player-bg-btn:active { transform: scale(.94); }

        /* ayat area */
        .ayat-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 12px 24px 16px; text-align: center; min-height: 0;
        }
        .ayat-area .ayat-inner { max-width: 640px; width: 100%; }
        .ayat-arabic {
            font-size: clamp(24px, 5.5vw, 38px);
            direction: rtl; color: rgba(255,255,255,.95);
            line-height: 1.9;
            text-shadow: 0 2px 40px rgba(0,0,0,.7);
            font-weight: 400; letter-spacing: 1px;
        }
        .ayat-trans {
            font-size: clamp(12px, 2vw, 15px);
            color: rgba(255,255,255,.45); margin-top: 10px;
            font-style: italic; padding: 0 8px;
        }

        /* controls panel */
        .player-controls { padding: 0 16px 12px; }

        .sura-meta { text-align: center; margin-bottom: 16px; }
        .sura-meta h2 {
            font-size: clamp(18px, 4vw, 24px); font-weight: 800; color: #fff;
            background: linear-gradient(120deg, #fff, var(--purple3));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sura-meta p { font-size: 12px; color: rgba(255,255,255,.38); margin-top: 3px; }

        /* progress */
        .progress-area { margin-bottom: 16px; }
        .progress-bar-wrap {
            position: relative; height: 4px;
            background: rgba(255,255,255,.1);
            border-radius: 4px; cursor: pointer;
            transition: height .2s;
        }
        .progress-bar-wrap:hover { height: 6px; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--purple), var(--purple2));
            border-radius: 4px;
            position: relative;
            transition: width .08s linear;
        }
        .progress-fill .thumb {
            position: absolute; right: -6px; top: -4px;
            width: 12px; height: 12px;
            background: var(--purple2);
            border-radius: 50%; border: 2px solid #fff;
            box-shadow: 0 0 12px rgba(167,139,250,.6);
        }
        .time-labels {
            display: flex; justify-content: space-between;
            font-size: 11px; color: rgba(255,255,255,.35);
            margin-top: 7px; font-variant-numeric: tabular-nums;
        }

        /* main controls */
        .main-controls {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; margin-bottom: 16px;
        }
        .ctrl-btn {
            background: none; border: none;
            color: rgba(255,255,255,.65);
            display: flex; align-items: center; justify-content: center;
            transition: .2s; border-radius: 50%; padding: 6px;
        }
        .ctrl-btn:hover  { color: #fff; }
        .ctrl-btn:active { transform: scale(.88); }
        .ctrl-btn svg    { fill: none; stroke: currentColor; stroke-width: 1.8; }
        .ctrl-small svg  { width: 24px; height: 24px; }
        .ctrl-medium svg { width: 28px; height: 28px; }

        .play-pause-btn {
            width: 64px; height: 64px;
            background: linear-gradient(145deg, var(--purple), var(--purple2));
            border-radius: 50%;
            color: #fff;
            box-shadow: 0 6px 28px rgba(124,92,231,.45), 0 0 0 8px rgba(124,92,231,.08);
            transition: .25s;
        }
        .play-pause-btn:hover  { box-shadow: 0 8px 36px rgba(124,92,231,.6), 0 0 0 10px rgba(124,92,231,.1); }
        .play-pause-btn:active { transform: scale(.92); }
        .play-pause-btn svg    { width: 26px; height: 26px; fill: #fff; stroke: none; margin-left: 2px; }
        .play-pause-btn.playing svg { margin-left: 0; }

        /* extra controls */
        .extra-controls {
            display: flex; align-items: center; gap: 10px;
            flex-wrap: wrap; justify-content: center;
        }
        .speed-btns { display: flex; gap: 5px; flex-wrap: wrap; }
        .speed-btn {
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 10px;
            color: rgba(255,255,255,.55);
            padding: 5px 11px;
            font-size: 11px; font-weight: 700;
            transition: .2s;
        }
        .speed-btn.active {
            background: linear-gradient(135deg, var(--purple), var(--purple2));
            border-color: transparent; color: #fff;
            box-shadow: 0 3px 12px rgba(124,92,231,.35);
        }
        .speed-btn:hover  { border-color: rgba(124,92,231,.35); color: rgba(255,255,255,.9); }
        .speed-btn:active { transform: scale(.92); }

        .volume-wrap {
            display: flex; align-items: center; gap: 7px;
            flex: 1; min-width: 80px; max-width: 130px;
        }
        .volume-wrap svg {
            width: 16px; height: 16px; fill: none;
            stroke: rgba(255,255,255,.4); stroke-width: 1.8;
            flex-shrink: 0;
        }
        .volume-wrap input[type="range"] {
            flex: 1; height: 3px;
            background: rgba(255,255,255,.12);
            border-radius: 3px;
            -webkit-appearance: none; appearance: none; outline: none;
        }
        .volume-wrap input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--purple2); cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 0 8px rgba(167,139,250,.5);
        }
        .volume-wrap input[type="range"]::-moz-range-thumb {
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--purple2); cursor: pointer;
            border: 2px solid #fff;
        }

        /* ============ МОДАЛ ВЫБОРА ФОНА ============ */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 400;
            background: rgba(0,0,0,.75);
            display: none; align-items: flex-end;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .modal-overlay.open { display: flex; }

        .modal-sheet {
            background: var(--bg2);
            border: 1px solid rgba(255,255,255,.07);
            border-top-left-radius: 28px; border-top-right-radius: 28px;
            padding: 24px 16px 32px;
            width: 100%; max-height: 72vh; overflow-y: auto;
            animation: slideUp .3s ease;
        }
        @keyframes slideUp {
            0%   { transform: translateY(40px); opacity: 0; }
            100% { transform: translateY(0);    opacity: 1; }
        }

        /* handle bar */
        .modal-sheet::before {
            content: '';
            display: block; width: 36px; height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,.15);
            margin: 0 auto 20px;
        }

        .modal-sheet h3 {
            font-size: 16px; font-weight: 700;
            margin-bottom: 18px; text-align: center; color: var(--text);
        }
        .bg-grid {
            display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
        }
        .bg-option {
            aspect-ratio: 16/10; border-radius: 14px;
            overflow: hidden; cursor: pointer;
            border: 2px solid transparent; transition: .2s;
            position: relative;
        }
        .bg-option.selected {
            border-color: var(--purple2);
            box-shadow: 0 0 0 3px rgba(167,139,250,.2);
        }
        .bg-option:active { transform: scale(.94); }
        .bg-option .bg-preview {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
        }
        .bg-option .bg-label {
            position: absolute; bottom: 4px; left: 0; right: 0;
            text-align: center; font-size: 10px; font-weight: 700;
            color: #fff; text-shadow: 0 1px 8px rgba(0,0,0,.9);
        }

        .modal-close-btn {
            width: 100%; margin-top: 18px; padding: 14px;
            background: rgba(124,92,231,.1);
            border: 1px solid rgba(124,92,231,.2);
            border-radius: 14px;
            color: var(--purple2); font-size: 14px; font-weight: 600;
            transition: .2s;
        }
        .modal-close-btn:hover  { background: rgba(124,92,231,.18); }
        .modal-close-btn:active { transform: scale(.97); }

        /* ── sura item entrance animation ── */
        .sura-item { opacity: 0; animation: itemIn .45s cubic-bezier(.34,1.56,.64,1) forwards; }
        @keyframes itemIn {
            from { opacity:0; transform: translateY(14px) scale(.96); }
            to   { opacity:1; transform: translateY(0)    scale(1); }
        }

        #audio-player { display: none; }
        .hidden { display: none !important; }

        /* scrollbar */
        ::-webkit-scrollbar      { width: 4px; }
        ::-webkit-scrollbar-track{ background: transparent; }
        ::-webkit-scrollbar-thumb{ background: rgba(124,92,231,.35); border-radius: 4px; }

        /* ── responsive ── */
        @media (max-width: 480px) {
            .topbar-back, .brand-icon { width:36px; height:36px; }
            .brand-title { font-size: 18px; }
            .sura-item { padding: 10px 12px; }
            .sura-num  { width: 32px; height: 32px; font-size: 11px; border-radius:10px; }
            .sura-name { font-size: 13px; }
            .sura-arabic{ font-size: 16px; }
            .player-header { padding-top: 36px; }
            .play-pause-btn { width:54px; height:54px; }
            .play-pause-btn svg { width:22px; height:22px; }
            .main-controls { gap: 8px; }
            .ctrl-small svg { width:20px; height:20px; }
            .ctrl-medium svg{ width:24px; height:24px; }
            .speed-btn { font-size:10px; padding:3px 8px; }
            .volume-wrap { max-width: 90px; min-width: 60px; }
        }
        @media (min-width: 768px) {
            .app { max-width: 640px; padding: 24px 20px 100px; }
            .sura-list { gap: 10px; }
            .player-controls { max-width: 560px; margin: 0 auto; width: 100%; }
            .ayat-area { padding: 20px 40px; }
            .player-header { padding-left: 24px; padding-right: 24px; }
        }
        @media (orientation: landscape) and (max-height: 500px) {
            .player-header { padding-top: 18px; padding-bottom: 4px; }
            .ayat-area { padding: 4px 20px; }
            .ayat-arabic { font-size: clamp(18px,3.5vw,28px); }
            .ayat-trans  { font-size:11px; margin-top:4px; }
            .sura-meta   { margin-bottom: 6px; }
            .sura-meta h2{ font-size:16px; }
            .main-controls { margin-bottom:6px; gap:8px; }
            .play-pause-btn{ width:44px; height:44px; }
            .play-pause-btn svg{ width:18px; height:18px; }
            .player-controls{ padding-bottom:6px; }
            .progress-area{ margin-bottom:6px; }
            .extra-controls{ gap:4px; }
            .speed-btn{ font-size:9px; padding:2px 6px; }
        }
    </style>
</head>
<body>

<audio id="audio-player" preload="metadata"></audio>

<!-- ========== ГЛАВНАЯ ========== -->
<div class="app" id="app">

    <div class="topbar">
        <a href="/Nur.html" class="topbar-back" title="На главную">←</a>
        <div class="brand">
            <div class="brand-icon">✦</div>
            <span class="brand-title">nur<span style="font-weight:400;opacity:.45">voice</span></span>
        </div>
        <div class="badge">
            <span class="badge-dot"></span>
            <span id="sura-count">114 сур</span>
        </div>
    </div>

    <div class="divider"></div>

    <div class="search-bar">
        <input type="text" id="search-input" placeholder="🔍 Поиск суры..." oninput="filterSuras(this.value)" />
    </div>

    <div class="sura-list" id="sura-list"></div>

    <button class="show-more-btn" id="show-more-btn" onclick="toggleAllSuras()">Показать все суры</button>
</div>

<!-- ========== ПЛЕЕР (оверлей) ========== -->
<div class="player-overlay" id="player-overlay">

    <div class="player-bg" id="player-bg">
        <video id="player-bg-video" autoplay muted loop playsinline></video>
        <div class="fallback" id="fallback-bg">🌙</div>
    </div>
    <div class="overlay"></div>
    <div class="vignette"></div>

    <div class="player-content">

        <div class="player-header">
            <button class="player-back" onclick="closePlayer()" title="Назад">←</button>
            <div class="player-header-info">
                <h3 id="ph-reader">Чтец</h3>
                <p id="ph-style">Коран · nur·voice</p>
            </div>
            <button class="player-bg-btn" onclick="openBgPicker()">🌄 Фон</button>
        </div>

        <div class="ayat-area">
            <div class="ayat-inner">
                <div class="ayat-arabic" id="current-ayat">﴿ بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴾</div>
                <div class="ayat-trans" id="current-trans">Во имя Аллаха, Милостивого, Милосердного</div>
            </div>
        </div>

        <div class="player-controls">
            <div class="sura-meta">
                <h2 id="ps-sura-name">Аль-Фатиха</h2>
                <p id="ps-sura-sub">Открывающая • 7 аятов</p>
            </div>

            <div class="progress-area">
                <div class="progress-bar-wrap" id="progress-wrap" onclick="seekAudio(event)">
                    <div class="progress-fill" id="progress-fill" style="width:0%">
                        <div class="thumb"></div>
                    </div>
                </div>
                <div class="time-labels">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="main-controls">
                <button class="ctrl-btn ctrl-medium" onclick="prevSura()" title="Предыдущая">
                    <svg viewBox="0 0 24 24"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button class="ctrl-btn ctrl-small" onclick="skipAudio(-10)" title="-10 сек">
                    <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="12" y="16" text-anchor="middle" font-size="7" fill="currentColor" stroke="none" style="font-family:sans-serif">10</text></svg>
                </button>
                <button class="ctrl-btn play-pause-btn" id="play-pause-btn" onclick="togglePlay()">
                    <svg viewBox="0 0 24 24" id="pp-icon"><polygon points="5,3 19,12 5,21"/></svg>
                </button>
                <button class="ctrl-btn ctrl-small" onclick="skipAudio(10)" title="+10 сек">
                    <svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="12" y="16" text-anchor="middle" font-size="7" fill="currentColor" stroke="none" style="font-family:sans-serif">10</text></svg>
                </button>
                <button class="ctrl-btn ctrl-medium" onclick="nextSura()" title="Следующая">
                    <svg viewBox="0 0 24 24"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
            </div>

            <div class="extra-controls">
                <div class="speed-btns">
                    <button class="speed-btn" onclick="setSpeed(0.75)">0.75×</button>
                    <button class="speed-btn active" onclick="setSpeed(1)">1×</button>
                    <button class="speed-btn" onclick="setSpeed(1.25)">1.25×</button>
                    <button class="speed-btn" onclick="setSpeed(1.5)">1.5×</button>
                </div>
                <div class="volume-wrap">
                    <svg viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    <input type="range" min="0" max="1" step="0.05" value="1" id="volume-slider" oninput="setVolume(this.value)" />
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ========== МОДАЛ ВЫБОРА ФОНА ========== -->
<div class="modal-overlay" id="bg-modal" onclick="closeBgPickerOutside(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
        <h3>🌄 Выберите фон</h3>
        <div class="bg-grid" id="bg-grid"></div>
        <button class="modal-close-btn" onclick="closeBgPicker()">Закрыть</button>
    </div>
</div>

<script>
    // ================================================================
    //  ДАННЫЕ: ВСЕ 114 СУР
    // ================================================================
    // ── Чтобы добавить суру: скопируй одну строку и измени данные ──
    const ALL_SURAS = [
        { num: 1,  name: 'Аль-Фатиха', arabic: 'الفاتحة',  ayats: 7,   duration: '1:7',
          ayat: '﴿ بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴾', trans: 'Во имя Аллаха, Милостивого, Милосердного',
          audio: './surah/01.mp3' },
        
        { num: 70,  name: 'Аль-Мааридж ', arabic: 'المعارج ',  ayats: 44,   duration: '22-28',
          ayat: '﴿ بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴾', trans: 'Во имя Аллаха, Милостивого, Милосердного',
          audio: './surah/70.mp3' },
        
        { num: 57,  name: 'Аль-Хадид', arabic: 'الحديد  ',  ayats: 29,   duration: '20',
          ayat: '﴿ بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴾', trans: 'Во имя Аллаха, Милостивого, Милосердного',
          audio: './surah/57.mp3' },
        
        { num: 43,  name: 'Аз-Зухруф ', arabic: 'الزخرف',  ayats: 89,   duration: '70-71',
          ayat: '﴿ بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴾', trans: 'Во имя Аллаха, Милостивого, Милосердного',
          audio: './surah/43.mp3' },

        { num: 76,  name: 'Аль-ИнсАн', arabic: 'الإنسان',  ayats: 31,   duration: '19-21',
          ayat: '﴿ بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴾', trans: 'Во имя Аллаха, Милостивого, Милосердного',
          audio: './surah/76.mp3' },

        { num: 17,  name: 'Аль-Исра ', arabic: 'الإسراء ',  ayats: 111,   duration: '19-21',
          ayat: '﴿ بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴾', trans: 'Во имя Аллаха, Милостивого, Милосердного',
          audio: './surah/17.mp3' },

        { num: 42,  name: ' Аш-Шура  ', arabic: 'الشورى',  ayats: 53,   duration: '?????',
          ayat: '﴿ بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴾', trans: 'Во имя Аллаха, Милостивого, Милосердного',
          audio: './surah/42.mp3' },

        { num: 13,  name: 'Ар-Рад', arabic: 'الرعد ',  ayats: 43,   duration: '31',
          ayat: '﴿ بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴾', trans: 'Во имя Аллаха, Милостивого, Милосердного',
          audio: './surah/13.mp3' },

        { num: 23,  name: 'Аль-Муминун', arabic: 'المؤمنون',  ayats: 118,   duration: '115-116',
          ayat: '﴿ بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴾', trans: 'Во имя Аллаха, Милостивого, Милосердного',
          audio: './surah/23.mp3' },

        { num: 8,  name: 'Аль-АнфАль', arabic: 'الأنفال ',  ayats: 75,   duration: '64-65',
          ayat: '﴿ بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴾', trans: 'Во имя Аллаха, Милостивого, Милосердного',
          audio: './surah/8.mp3' },
        
        
        // ── Добавляй новые суры сюда в том же формате ──
        // { num: 10, name: 'Юнус', arabic: 'يونس', ayats: 109, duration: '32:20',
        //   ayat: '﴿ ... ﴾', trans: '...', audio: 'surah/yunus.mp3' },
    ];

    const BACKGROUNDS = [
        { label: 'Дождь',  color: '#060c14', emoji: '🌧', url: '/fon/дождь.mp4' },
        { label: 'Молния', color: '#06050f', emoji: '⚡', url: '/fon/молния.mp4' },
        { label: 'Облака', color: '#0a0d16', emoji: '☁️', url: '/fon/облаок.mp4' },
        { label: 'Океан',  color: '#030d14', emoji: '🌊', url: '/fon/океан.mp4' },
        { label: 'Травы',  color: '#050f05', emoji: '🌿', url: '/fon/травы.mp4' },
        { label: 'Роза',   color: '#100408', emoji: '🌹', url: '/fon/роза.mp4' },
        { label: 'Огонь',  color: '#120600', emoji: '🔥', url: '/fon/огонь.mp4' },
        { label: 'Цветы',  color: '#0d0510', emoji: '🌸', url: '/fon/цветы.mp4' },
        { label: 'Луна',   color: '#060810', emoji: '🌙', url: '/fon/луна.mp4' },
    ];

    // ── STATE ──
    let currentSuraIdx = 0, isPlaying = false, progressInterval = null;
    let showAll = false, currentBgIndex = 0;
    const audio = document.getElementById('audio-player');

    function formatTime(s) {
        if (!s || isNaN(s)) return '0:00';
        const m = Math.floor(s / 60), sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }
    function renderSuras() {
        const list = ALL_SURAS;
        const container = document.getElementById('sura-list');
        container.innerHTML = list.map((s) => {
            const realIdx = ALL_SURAS.indexOf(s);
            return `<div class="sura-item" style="animation-delay:${realIdx * 45}ms" onclick="playSura(${realIdx})">
                <div class="sura-num">${s.num}</div>
                <div class="sura-info">
                    <div class="sura-name">${s.name}</div>
                    <div class="sura-sub">${s.ayats} аятов</div>
                </div>
                <div class="sura-right">
                    <div class="sura-arabic">${s.arabic}</div>
                    <div class="sura-duration">${s.duration}</div>
                </div>
            </div>`;
        }).join('');
        document.getElementById('sura-count').textContent = `${list.length} сур`;
        const btn = document.getElementById('show-more-btn');
        if (btn) btn.style.display = 'none';
    }

    function toggleAllSuras() {}

    function filterSuras(q) {
        if (!q.trim()) { renderSuras(); return; }
        const filtered = ALL_SURAS.filter(s =>
            s.name.toLowerCase().includes(q.toLowerCase()) ||
            s.num.toString().includes(q) ||
            s.arabic.includes(q)
        );
        document.getElementById('sura-list').innerHTML = filtered.map((s) => {
            const i = ALL_SURAS.indexOf(s);
            return `<div class="sura-item" onclick="playSura(${i})">
                <div class="sura-num">${s.num}</div>
                <div class="sura-info">
                    <div class="sura-name">${s.name}</div>
                    <div class="sura-sub">${s.ayats} аятов</div>
                </div>
                <div class="sura-right">
                    <div class="sura-arabic">${s.arabic}</div>
                    <div class="sura-duration">${s.duration}</div>
                </div>
            </div>`;
        }).join('');
    }

    function playSura(idx) {
        const sura = ALL_SURAS[idx];
        if (!sura) return;
        currentSuraIdx = idx;
        document.getElementById('ps-sura-name').textContent = sura.name;
        document.getElementById('ps-sura-sub').textContent  = `${sura.arabic} • ${sura.ayats} аятов`;
        document.getElementById('current-ayat').textContent = sura.ayat || '﴿ بِسْمِ اللَّهِ ﴾';
        document.getElementById('current-trans').textContent = sura.trans || '';
        document.getElementById('ph-reader').textContent    = 'Чтец';
        document.getElementById('ph-style').textContent     = 'Коран · nur·voice';
        if (sura.audio && sura.audio.trim()) {
            audio.src = sura.audio; audio.load();
            audio.play().then(() => { isPlaying = true;  updatePlayBtn(); })
                        .catch(() => { isPlaying = false; updatePlayBtn(); });
        } else {
            audio.src = ''; isPlaying = false; updatePlayBtn();
        }
        applyBg();
        document.getElementById('player-overlay').classList.add('open');
        document.body.style.overflow = 'hidden';
        startProgressUpdate();
    }

    function closePlayer() {
        audio.pause(); isPlaying = false;
        clearInterval(progressInterval);
        document.getElementById('player-overlay').classList.remove('open');
        document.body.style.overflow = '';
        updatePlayBtn();
    }

    function togglePlay() {
        if (!audio.src) return;
        isPlaying ? audio.pause() : audio.play();
        isPlaying = !isPlaying;
        updatePlayBtn();
    }

    function updatePlayBtn() {
        const btn = document.getElementById('play-pause-btn');
        const icon = document.getElementById('pp-icon');
        if (isPlaying) {
            btn.classList.add('playing');
            icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
        } else {
            btn.classList.remove('playing');
            icon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
        }
    }

    function skipAudio(sec) {
        if (!audio.duration) return;
        audio.currentTime = Math.max(0, Math.min(audio.duration, audio.currentTime + sec));
    }

    function setSpeed(s) {
        audio.playbackRate = s;
        document.querySelectorAll('.speed-btn').forEach(b => {
            b.classList.toggle('active', Math.abs(parseFloat(b.textContent) - s) < .01);
        });
    }

    function setVolume(v) { audio.volume = parseFloat(v); }

    function seekAudio(e) {
        const rect = document.getElementById('progress-wrap').getBoundingClientRect();
        const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        if (audio.duration) audio.currentTime = pct * audio.duration;
    }

    function nextSura() { playSura((currentSuraIdx + 1) % ALL_SURAS.length); }
    function prevSura() { playSura((currentSuraIdx - 1 + ALL_SURAS.length) % ALL_SURAS.length); }

    function startProgressUpdate() {
        clearInterval(progressInterval);
        progressInterval = setInterval(() => {
            if (audio.duration) {
                const pct = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progress-fill').style.width = pct + '%';
                document.getElementById('time-current').textContent = formatTime(audio.currentTime);
                document.getElementById('time-total').textContent   = formatTime(audio.duration);
            }
        }, 300);
    }

    function applyBg() {
        const bg  = BACKGROUNDS[currentBgIndex] || BACKGROUNDS[0];
        const vid = document.getElementById('player-bg-video');
        const fb  = document.getElementById('fallback-bg');
        if (bg.url) {
            vid.src = bg.url; vid.style.display = 'block'; fb.style.display = 'none';
            vid.load(); vid.play().catch(() => {});
        } else {
            vid.src = ''; vid.style.display = 'none'; fb.style.display = 'flex';
            fb.textContent = bg.emoji || '🌙';
            document.getElementById('player-bg').style.background = bg.color || '#080a0f';
        }
    }

    function renderBgGrid() {
        document.getElementById('bg-grid').innerHTML = BACKGROUNDS.map((b, i) => `
            <div class="bg-option ${i === currentBgIndex ? 'selected' : ''}" onclick="selectBg(${i})">
                <div class="bg-preview" style="background:${b.color}">
                    <span style="font-size:32px">${b.emoji}</span>
                </div>
                <div class="bg-label">${b.label}</div>
            </div>`).join('');
    }

    function selectBg(i)  { currentBgIndex = i; applyBg(); renderBgGrid(); }
    function openBgPicker(){ renderBgGrid(); document.getElementById('bg-modal').classList.add('open'); }
    function closeBgPicker(){ document.getElementById('bg-modal').classList.remove('open'); }
    function closeBgPickerOutside(e){ if (e.target === document.getElementById('bg-modal')) closeBgPicker(); }

    audio.addEventListener('ended', () => { isPlaying = false; updatePlayBtn(); nextSura(); });
    audio.addEventListener('error', () => { isPlaying = false; updatePlayBtn(); });

    renderSuras();
    document.getElementById('volume-slider').value = 1;
</script>
</body>
</html>
